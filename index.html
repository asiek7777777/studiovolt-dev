<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Volt</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      h1 span {
        color: #facc15;
      }
      p {
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      .apps {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .app-card {
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 1.5rem 2rem;
        text-decoration: none;
        color: #e2e8f0;
        transition: border-color 0.2s;
      }
      .app-card:hover {
        border-color: #facc15;
      }
      .app-card h2 {
        font-size: 1.1rem;
        margin-bottom: 0.25rem;
      }
      .app-card span {
        font-size: 0.85rem;
        color: #94a3b8;
      }
      footer {
        position: fixed;
        bottom: 1.5rem;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.8rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Studio <span>Volt</span></h1>
      <p>Apps built in Switzerland</p>
      <div class="apps">
        <a href="/gps-stats/" class="app-card">
          <h2>GPS Stats</h2>
          <span>GPS Speedometer & Performance Tracker</span>
        </a>
      </div>
    </div>
    <footer>&copy; 2026 Studio Volt</footer>
  </body>
</html>
